name: Stock Treasury Pages

on:
  workflow_dispatch:
    inputs:
      reference_ticker_twd:
        description: "TW reference ticker, for example 0050.TW or 006208.TW"
        required: false
        default: "0050.TW"
  schedule:
    - cron: "30 9 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: stock-treasury-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build HTML and JSON reports
        run: >
          python app.py
          --transactions data/transactions.csv
          --dividends data/dividends.csv
          --cache-hours 1
          --reference-ticker-twd "${{ github.event.inputs.reference_ticker_twd || '0050.TW' }}"
          --output output/report.html
          --json-output output/report.json

      - name: Prepare Pages artifact
        run: |
          mkdir -p pages
          cp output/report.html pages/index.html
          cp output/report.json pages/report.json

      - name: Commit generated reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/report.html output/report.json
          if git diff --cached --quiet; then
            echo "No generated report changes to commit."
          else
            git commit -m "Update stock treasury report"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
